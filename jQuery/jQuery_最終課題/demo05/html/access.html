<!DOCTYPE html>
<html>

<!-- headここから -->

<head>
  <meta charset="UTF-8">
  <title>ACCESS | KISSA official website</title>
  <meta name="description" content="カフェ「KISSA」のアクセスマップ問い合わせフォームが掲載されたページです。">
  <meta name="viewport" content="width=device-width">
  <script src="../js/toggle-menu.js"></script>
  <link href="../css/common.css" rel="stylesheet">
  <link href="../css/access.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <!-- ↓ にCDN経由でjQueryを読み込む -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js" integrity="sha256-AlTido85uXPlSyyaZNsjJXeCs07eSv3r43kyCVc8ChI=" crossorigin="anonymous"></script>
  <!-- jsファイルの読み込み -->
  <script src="../js/main.js"></script>
</head>
<!-- headここまで -->

<body>
  <!-- headerここから -->
  <header class="header">
    <!-- div: 空の箱を作成。cssと併用する -->
    <div class="header-inner">
      <!-- a: 別ページへのリンクを張る  -->
      <!-- href: 飛ばす先 <a>クリックしたい要素</a> -->
      <a class="header-logo" href="./index.html">
        <!-- img: 写真を挿入, src: 写真のある場所 -->
        <img src="../images/common/logo-header.png" alt="KISSA">
      </a>
      <!-- button: ボタンを作成'.js'と併用 -->
      <button class="toggle-menu-button"></button>
      <div class="header-site-menu">
        <!-- nav: ナビケーションリンク作成 -->
        <nav class="site-menu">
          <ul>
            <!-- ul: 箇条書き -->
            <!-- li: 項目を作成 -->
            <li><a href="./concept.html">CONCEPT</a></li>
            <li><a href="./menu.html">MENU</a></li>
            <li><a href="./shop.html">SHOP</a></li>
            <li><a href="./access.html">ACCESS</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>
  <!-- headerここまで -->

  <!-- mainここから -->
  <main class="main">
    <div class="title">
      <h1>ACCESS</h1>
      <p>アクセス・問い合わせ</p>
    </div>
    <div class="map">
      <h2>アクセスマップ</h2>
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4021.5769845248215!2d136.87934821744378!3d35.17091500000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x600376e794d78b89%3A0x81f7204bf8261663!2z5ZCN5Y-k5bGL6aeF!5e1!3m2!1sja!2sjp!4v1778593251784!5m2!1sja!2sjp" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
    <div class="contact">
      <h2>お問い合わせフォーム</h2>
      <form action="#">
        <dl class="form-area">
          <dt><span class="required">お名前</span></dt>
          <dd><input class="input-text" type="text" name="name" required></dd>
          <dt><span class="required">メールアドレス</span></dt>
          <dd><input class="input-text" type="email" name="email" required></dd>
          <dt><span>お電話番号</span></dt>
          <dd><input class="input-text" type="tel" name="tel"></dd>
          <dt><span>お問い合わせ種別</span></dt>
          <dd>
            <select class="select-box" name="genre">
              <option value="ご予約について" selected>ご予約について</option>
              <option value="メニューについて">メニューについて</option>
              <option value="営業時間について">営業時間について</option>
            </select>
          </dd>
          <dt><span>お客様について</span></dt>
          <dd>
            <label class="radio-button"><input type="radio" name="user-type" value="一般のお客様" checked>一般のお客様</label>
            <label class="radio-button"><input type="radio" name="user-type" value="お取引先様">お取引先様</label>
            <label class="radio-button"><input type="radio" name="user-type" value="その他">その他</label>
          </dd>
          <dt><span class="required">お問い合わせ内容</span></dt>
          <dd><textarea class="message" name="message" required></textarea></dd>
        </dl>
        <p class="confirm-text">ご入力内容をご確認の上、お間違いがなければ[Submit]ボタンを押してください。</p>
        <button class="submit-button" type="submit">Submit</button>
      </form>
    </div>
  </main>
  <!-- mainここまで -->

  <!-- footerここから -->
  <footer class="footer">
    <nav class="site-menu">
      <ul>
        <li><a href="./concept.html">CONCEPT</a></li>
        <li><a href="./menu.html">MENU</a></li>
        <li><a href="./shop.html">SHOP</a></li>
        <li><a href="./access.html">ACCESS</a></li>
      </ul>
    </nav>
    <a class="footer-logo" href="./index.html">
      <img src="../images/common/logo-footer.png" alt="KISSA">
    </a>
    <!-- p: 文章を作成, &copy; ©を作成 -->
    <p class="footer-tel">TEL 01-2345-6789</p>
    <p class="footer-time">OPEN Fri-Sun 11:00-16:00</p>
    <p class="copyright"><small>&copy;Kissa</small></p>
  </footer>
  <!-- footerここまで -->
</body>

</html>
